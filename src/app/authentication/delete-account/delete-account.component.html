
<div class="confirm-delete-container">
    <h2>Eliminar cuenta</h2>
    <p>Para confirmar la eliminación, introduce tu correo electrónico:</p>
    <mat-form-field appearance="outline" class="email-input">
      <mat-label>Correo electrónico</mat-label>
      <input matInput type="email" [(ngModel)]="email" placeholder="correo@email.com">
    </mat-form-field>
    <p>Una vez confirmada la eliminación, no podrás recuperar tu cuenta.</p>
    <p>Si deseas eliminar tu cuenta, introduce tu correo electrónico y haz clic en el botón de confirmación.</p>
    <div class="actions">
      <button mat-button color="warn" (click)="onConfirm()" [disabled]="!email">Confirmar eliminación</button>
    </div>
  </div>
